.form-range::-moz-range-track {

}

.btn:focus-visible {

  outline-offset: 2px;
}

svg {

  height: auto;

#widget &gt; svg {

}

.text-warning,

&lt;style&gt;
  #tmspeech-glass-settings {
    --gm-s1: 0.4rem;
    --gm-s2: 0.7rem;
    --gm-s3: 1rem;
    --gm-s4: 1.5rem;
    --gm-s5: 2rem;
    position: relative;
    width: 100%;
    color: var(--foreground);
    isolation: isolate;
  }

  #tmspeech-glass-settings * { box-sizing: border-box; }
  #tmspeech-glass-settings h2,
  #tmspeech-glass-settings h3,
  #tmspeech-glass-settings p { margin-top: 0; }

  #tmspeech-glass-settings .gm-ambient {
    position: absolute;
    inset: 4% 2% auto;
    height: 22rem;
    z-index: -1;
    pointer-events: none;
    background:
      radial-gradient(circle at 12% 28%, color-mix(in srgb, var(--viz-series-1) 24%, transparent), transparent 34%),
      radial-gradient(circle at 82% 5%, color-mix(in srgb, var(--viz-series-2) 16%, transparent), transparent 38%);
    filter: blur(2rem);
  }

  #tmspeech-glass-settings .gm-shell {
    display: grid;
    grid-template-columns: minmax(10.5rem, 13rem) minmax(0, 1fr);
    padding: 0.5rem;
    height: 36rem;
    min-height: 30rem;
    overflow: hidden;
    background: color-mix(in srgb, var(--card) 62%, transparent);
    border: 1px solid color-mix(in srgb, var(--border) 72%, transparent);
    border-radius: 1.35rem;
    box-shadow: 0 1.5rem 4rem color-mix(in srgb, var(--foreground) 10%, transparent);
    -webkit-backdrop-filter: blur(1.7rem) saturate(145%);
    backdrop-filter: blur(1.7rem) saturate(145%);
    transition: height 320ms cubic-bezier(0.22, 1, 0.36, 1), opacity 180ms ease, transform 220ms ease;
  }

  #tmspeech-glass-settings .gm-shell.gm-maximized { height: 43rem; }

  #tmspeech-glass-settings .gm-sidebar {
    display: flex;
    flex-direction: column;
    min-width: 0;
    padding: var(--gm-s3) 0.5rem var(--gm-s3) 0;
    overflow: hidden;
  }

  #tmspeech-glass-settings .gm-brand {
    display: flex;
    align-items: center;
    gap: var(--gm-s2);
    padding: 0 var(--gm-s2) var(--gm-s4);
  }

  #tmspeech-glass-settings .gm-brand-mark {
    display: grid;
    place-items: center;
    width: 2.25rem;
    height: 2.25rem;
    flex: 0 0 auto;
    border-radius: 50%;
    color: var(--primary-foreground);
    background: var(--primary);
  }

  #tmspeech-glass-settings .gm-nav {
    position: relative;
    display: flex;
    flex-direction: column;
    gap: var(--gm-s1);
  }

  #tmspeech-glass-settings .gm-nav .btn {
    justify-content: flex-start;
    gap: var(--gm-s2);
    width: 100%;
  }

  #tmspeech-glass-settings .gm-nav .btn[aria-selected=&quot;true&quot;] {
    color: var(--foreground);
    background: color-mix(in srgb, var(--primary) 18%, transparent);
  }

  #tmspeech-glass-settings .gm-nav-indicator {
    position: absolute;
    left: -0.35rem;
    top: 0;
    width: 0.22rem;
    height: 2rem;
    border-radius: 999px;
    background: var(--primary);
    box-shadow: 0 0 1rem color-mix(in srgb, var(--primary) 44%, transparent);
    pointer-events: none;
    transition: transform 240ms cubic-bezier(0.22, 1, 0.36, 1), height 180ms ease-out;
  }

  #tmspeech-glass-settings .gm-nav-separator {
    height: 1px;
    margin: var(--gm-s2) 0;
    background: color-mix(in srgb, var(--border) 72%, transparent);
  }

  #tmspeech-glass-settings .gm-sidebar-foot {
    display: flex;
    align-items: center;
    gap: var(--gm-s2);
    margin-top: auto;
    padding: var(--gm-s4) var(--gm-s2) 0;
  }

  #tmspeech-glass-settings .gm-detail {
    display: flex;
    flex-direction: column;
    min-width: 0;
    min-height: 0;
    padding: var(--gm-s5);
    color: var(--foreground);
    background: var(--background);
    border: 1px solid color-mix(in srgb, var(--border) 74%, transparent);
    border-radius: 1rem;
    overflow: hidden;
  }

  #tmspeech-glass-settings .gm-detail-top,
  #tmspeech-glass-settings .gm-page-head,
  #tmspeech-glass-settings .gm-row,
  #tmspeech-glass-settings .gm-inline,
  #tmspeech-glass-settings .gm-value-line {
    display: flex;
    align-items: center;
    gap: var(--gm-s2);
  }

  #tmspeech-glass-settings .gm-detail-top {
    justify-content: space-between;
    flex: 0 0 auto;
    min-height: 2rem;
    padding-bottom: var(--gm-s3);
    border-bottom: 1px solid var(--border);
  }

  #tmspeech-glass-settings .gm-window-actions,
  #tmspeech-glass-settings .gm-window-controls {
    display: flex;
    align-items: center;
    gap: var(--gm-s1);
  }

  #tmspeech-glass-settings .gm-page-scroll {
    flex: 1 1 auto;
    min-height: 0;
    overflow-y: auto;
    overflow-x: hidden;
    margin-right: -0.55rem;
    padding-right: 0.55rem;
    scrollbar-width: thin;
    scrollbar-color: color-mix(in srgb, var(--foreground) 28%, transparent) transparent;
    scroll-behavior: smooth;
  }

  #tmspeech-glass-settings .gm-page-scroll::-webkit-scrollbar { width: 0.45rem; }
  #tmspeech-glass-settings .gm-page-scroll::-webkit-scrollbar-track { background: transparent; }
  #tmspeech-glass-settings .gm-page-scroll::-webkit-scrollbar-thumb {
    background: color-mix(in srgb, var(--foreground) 28%, transparent);
    border-radius: 999px;
  }

  #tmspeech-glass-settings .gm-pane {
    opacity: 1;
    transform: translateY(0);
    transition: opacity 150ms ease-out, transform 210ms cubic-bezier(0.22, 1, 0.36, 1);
  }

  #tmspeech-glass-settings .gm-pane.gm-page-leaving {
    opacity: 0;
    transform: translateY(-0.45rem);
    transition-timing-function: ease-in;
  }

  #tmspeech-glass-settings .gm-pane.gm-page-entering {
    opacity: 0;
    transform: translateY(0.55rem);
  }

  #tmspeech-glass-settings .gm-page-head {
    align-items: center;
    justify-content: space-between;
    margin: var(--gm-s3) 0;
  }

  #tmspeech-glass-settings .gm-page-head h2,
  #tmspeech-glass-settings .gm-page-head h3 { margin-bottom: 0; }

  #tmspeech-glass-settings .gm-page-head p,
  #tmspeech-glass-settings .gm-copy p,
  #tmspeech-glass-settings .gm-section-head p { margin: var(--gm-s1) 0 0; }

  #tmspeech-glass-settings .gm-content-grid {
    display: block;
  }

  #tmspeech-glass-settings .gm-preview-wrap {
    position: sticky;
    top: 0;
    z-index: 2;
    padding: var(--gm-s2) 0 var(--gm-s3);
    background: var(--background);
    border-bottom: 1px solid var(--border);
  }

  #tmspeech-glass-settings .gm-preview-stage {
    display: grid;
    place-items: center;
    min-height: 7rem;
    margin-top: var(--gm-s2);
    padding: var(--gm-s3);
    overflow: hidden;
    background:
      radial-gradient(circle at 18% 16%, color-mix(in srgb, var(--viz-series-1) 18%, transparent), transparent 34%),
      linear-gradient(145deg, var(--muted), var(--background));
    border: 1px solid var(--border);
    border-radius: 0.85rem;
  }

  #tmspeech-glass-settings .gm-caption {
    width: 100%;
    padding: var(--gm-s3);
    color: #ffffff;
    background: rgba(20, 24, 32, 0.78);
    text-align: center;
    overflow-wrap: anywhere;
    transition: color 180ms ease, background-color 180ms ease, text-shadow 180ms ease;
  }

  #tmspeech-glass-settings .gm-preview-meta {
    display: flex;
    justify-content: space-between;
    gap: var(--gm-s2);
    margin-top: var(--gm-s2);
  }

  #tmspeech-glass-settings .gm-sections,
  #tmspeech-glass-settings .gm-section {
    display: grid;
    gap: var(--gm-s2);
  }

  #tmspeech-glass-settings .gm-sections { gap: var(--gm-s5); }
  #tmspeech-glass-settings .gm-sections {
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: var(--gm-s4);
    padding-top: var(--gm-s4);
  }
  #tmspeech-glass-settings .gm-section-head {
    padding-bottom: var(--gm-s2);
    border-bottom: 1px solid var(--border);
  }

  #tmspeech-glass-settings .gm-setting {
    display: grid;
    grid-template-columns: minmax(0, 1fr) minmax(9.5rem, 13rem);
    gap: var(--gm-s3);
    align-items: center;
    padding: var(--gm-s2) 0;
  }

  #tmspeech-glass-settings .gm-setting + .gm-setting {
    border-top: 1px solid color-mix(in srgb, var(--border) 70%, transparent);
  }

  #tmspeech-glass-settings .gm-control { min-width: 0; }
  #tmspeech-glass-settings .gm-control .form-select,
  #tmspeech-glass-settings .gm-control .form-control { width: 100%; }
  #tmspeech-glass-settings .gm-value-line { justify-content: space-between; }
  #tmspeech-glass-settings .gm-row { justify-content: flex-end; flex-wrap: wrap; }
  #tmspeech-glass-settings .gm-color-control {
    display: grid;
    grid-template-columns: auto minmax(0, 1fr);
    gap: var(--gm-s2);
    align-items: center;
  }

  #tmspeech-glass-settings .gm-generic {
    display: grid;
    gap: var(--gm-s5);
  }

  #tmspeech-glass-settings .gm-generic-block {
    display: grid;
    gap: var(--gm-s2);
    max-width: none;
  }

  #tmspeech-glass-settings .gm-generic-block &gt; .gm-section {
    grid-template-columns: repeat(2, minmax(0, 1fr));
    column-gap: var(--gm-s4);
  }

  #tmspeech-glass-settings .gm-generic-block &gt; .gm-section &gt; .gm-section-head { grid-column: 1 / -1; }

  #tmspeech-glass-settings .gm-sections .gm-setting,
  #tmspeech-glass-settings .gm-generic-block .gm-setting { grid-template-columns: 1fr; }

  #tmspeech-glass-settings .gm-about-banner {
    display: flex;
    align-items: center;
    gap: var(--gm-s4);
    padding: var(--gm-s4);
    color: var(--primary-foreground);
    background: var(--primary);
    border-radius: 0.9rem;
  }

  #tmspeech-glass-settings .gm-about-icon {
    display: grid;
    place-items: center;
    width: 4rem;
    height: 4rem;
    flex: 0 0 auto;
    border-radius: 50%;
    color: var(--primary);
    background: var(--primary-foreground);
  }

  #tmspeech-glass-settings .gm-about-meta,
  #tmspeech-glass-settings .gm-about-projects {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: var(--gm-s4);
  }

  #tmspeech-glass-settings .gm-about-copy {
    display: grid;
    gap: var(--gm-s3);
  }

  #tmspeech-glass-settings .gm-about-project {
    padding: var(--gm-s3) 0;
    border-top: 1px solid var(--border);
  }

  #tmspeech-glass-settings [hidden] { display: none !important; }

  @media (max-width: 680px) {
    #tmspeech-glass-settings .gm-shell { grid-template-columns: minmax(9rem, 10.5rem) minmax(0, 1fr); }
    #tmspeech-glass-settings .gm-detail { padding: var(--gm-s4); }
    #tmspeech-glass-settings .gm-sections,
    #tmspeech-glass-settings .gm-generic-block &gt; .gm-section { grid-template-columns: 1fr; }
  }

  @media (max-width: 560px) {

    #tmspeech-glass-settings .gm-shell.gm-maximized { grid-template-columns: 1fr; height: auto; min-height: 0; }
    #tmspeech-glass-settings .gm-sidebar { padding: var(--gm-s3) 0.5rem; }
    #tmspeech-glass-settings .gm-brand { padding-bottom: var(--gm-s3); }
    #tmspeech-glass-settings .gm-nav { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); }
    #tmspeech-glass-settings .gm-nav-indicator,
    #tmspeech-glass-settings .gm-nav-separator,
    #tmspeech-glass-settings .gm-sidebar-foot { display: none; }
    #tmspeech-glass-settings .gm-detail { margin-top: 0.25rem; padding: var(--gm-s3); }
    #tmspeech-glass-settings .gm-page-head { flex-direction: column; }
    #tmspeech-glass-settings .gm-setting { grid-template-columns: 1fr; }
    #tmspeech-glass-settings .gm-row { justify-content: flex-start; }
    #tmspeech-glass-settings .gm-about-meta,
    #tmspeech-glass-settings .gm-about-projects { grid-template-columns: 1fr; }
  }

  @media (max-width: 380px) {

  @media (prefers-reduced-motion: reduce) {
    #tmspeech-glass-settings .gm-caption,
    #tmspeech-glass-settings .gm-shell,
    #tmspeech-glass-settings .gm-nav-indicator,

              &lt;div class=&quot;gm-setting&quot;&gt;
                &lt;div class=&quot;gm-copy&quot;&gt;&lt;label for=&quot;gm-font&quot;&gt;字体&lt;/label&gt;&lt;p class=&quot;text-small text-muted&quot;&gt;用于字幕窗口的主要字体。&lt;/p&gt;&lt;/div&gt;
                &lt;select id=&quot;gm-font&quot; class=&quot;form-select&quot;&gt;&lt;option value=&quot;Microsoft YaHei, sans-serif&quot;&gt;微软雅黑&lt;/option&gt;&lt;option value=&quot;Inter, sans-serif&quot;&gt;Inter&lt;/option&gt;&lt;option value=&quot;Arial, sans-serif&quot;&gt;Arial&lt;/option&gt;&lt;/select&gt;
              &lt;/div&gt;
              &lt;div class=&quot;gm-setting&quot;&gt;
                &lt;div class=&quot;gm-copy&quot;&gt;&lt;label for=&quot;gm-size&quot;&gt;字号&lt;/label&gt;&lt;p class=&quot;text-small text-muted&quot;&gt;推荐使用 24–48 像素。&lt;/p&gt;&lt;/div&gt;
                &lt;div class=&quot;gm-control&quot;&gt;&lt;div class=&quot;gm-value-line&quot;&gt;&lt;span class=&quot;text-small text-muted&quot;&gt;大小&lt;/span&gt;&lt;output id=&quot;gm-size-value&quot;&gt;32 px&lt;/output&gt;&lt;/div&gt;&lt;input id=&quot;gm-size&quot; class=&quot;form-range&quot; type=&quot;range&quot; min=&quot;18&quot; max=&quot;64&quot; value=&quot;32&quot;&gt;&lt;/div&gt;
              &lt;/div&gt;
              &lt;div class=&quot;gm-setting&quot;&gt;
                &lt;div class=&quot;gm-copy&quot;&gt;&lt;span&gt;文字对齐&lt;/span&gt;&lt;p class=&quot;text-small text-muted&quot;&gt;设置字幕在窗口中的位置。&lt;/p&gt;&lt;/div&gt;
                &lt;div class=&quot;gm-row&quot; role=&quot;group&quot; aria-label=&quot;文字对齐&quot;&gt;&lt;button class=&quot;btn btn-ghost&quot; type=&quot;button&quot; data-align=&quot;left&quot; aria-pressed=&quot;false&quot;&gt;左&lt;/button&gt;&lt;button class=&quot;btn btn-ghost is-selected&quot; type=&quot;button&quot; data-align=&quot;center&quot; aria-pressed=&quot;true&quot;&gt;居中&lt;/button&gt;&lt;button class=&quot;btn btn-ghost&quot; type=&quot;button&quot; data-align=&quot;right&quot; aria-pressed=&quot;false&quot;&gt;右&lt;/button&gt;&lt;/div&gt;
              &lt;/div&gt;
            &lt;/section&gt;

            &lt;section class=&quot;gm-section&quot;&gt;
              &lt;div class=&quot;gm-section-head&quot;&gt;&lt;h3&gt;颜色与效果&lt;/h3&gt;&lt;p class=&quot;text-small text-muted&quot;&gt;实时预览不同背景下的可读性。&lt;/p&gt;&lt;/div&gt;
              &lt;div class=&quot;gm-setting&quot;&gt;
                &lt;div class=&quot;gm-copy&quot;&gt;&lt;label for=&quot;gm-color&quot;&gt;字体颜色&lt;/label&gt;&lt;/div&gt;
                &lt;div class=&quot;gm-color-control&quot;&gt;&lt;input id=&quot;gm-color&quot; class=&quot;form-control form-control-color&quot; type=&quot;color&quot; value=&quot;#ffffff&quot;&gt;&lt;output id=&quot;gm-color-value&quot;&gt;#FFFFFF&lt;/output&gt;&lt;/div&gt;
              &lt;/div&gt;
              &lt;div class=&quot;gm-setting&quot;&gt;
                &lt;div class=&quot;gm-copy&quot;&gt;&lt;label for=&quot;gm-opacity&quot;&gt;背景透明度&lt;/label&gt;&lt;p class=&quot;text-small text-muted&quot;&gt;建议保持在 65% 以上。&lt;/p&gt;&lt;/div&gt;
                &lt;div class=&quot;gm-control&quot;&gt;&lt;div class=&quot;gm-value-line&quot;&gt;&lt;span class=&quot;text-small text-muted&quot;&gt;不透明度&lt;/span&gt;&lt;output id=&quot;gm-opacity-value&quot;&gt;78%&lt;/output&gt;&lt;/div&gt;&lt;input id=&quot;gm-opacity&quot; class=&quot;form-range&quot; type=&quot;range&quot; min=&quot;20&quot; max=&quot;100&quot; value=&quot;78&quot;&gt;&lt;/div&gt;
              &lt;/div&gt;
              &lt;div class=&quot;gm-setting&quot;&gt;
                &lt;div class=&quot;gm-copy&quot;&gt;&lt;label for=&quot;gm-shadow&quot;&gt;文字阴影&lt;/label&gt;&lt;p class=&quot;text-small text-muted&quot;&gt;提升复杂画面中的辨识度。&lt;/p&gt;&lt;/div&gt;
                &lt;div class=&quot;gm-control&quot;&gt;&lt;div class=&quot;gm-value-line&quot;&gt;&lt;span class=&quot;text-small text-muted&quot;&gt;强度&lt;/span&gt;&lt;output id=&quot;gm-shadow-value&quot;&gt;2 px&lt;/output&gt;&lt;/div&gt;&lt;input id=&quot;gm-shadow&quot; class=&quot;form-range&quot; type=&quot;range&quot; min=&quot;0&quot; max=&quot;8&quot; value=&quot;2&quot;&gt;&lt;/div&gt;
              &lt;/div&gt;
            &lt;/section&gt;
          &lt;/div&gt;
        &lt;/div&gt;
      &lt;/section&gt;

      &lt;section id=&quot;gm-generic-pane&quot; class=&quot;gm-generic gm-pane&quot; data-pane=&quot;generic&quot; hidden&gt;
        &lt;div class=&quot;gm-page-head&quot;&gt;&lt;div&gt;&lt;h3 id=&quot;gm-generic-title&quot;&gt;&lt;/h3&gt;&lt;p id=&quot;gm-generic-description&quot; class=&quot;text-small text-muted&quot;&gt;&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;
        &lt;div id=&quot;gm-generic-body&quot; class=&quot;gm-generic-block&quot;&gt;&lt;/div&gt;
      &lt;/section&gt;

      &lt;section id=&quot;gm-about-pane&quot; class=&quot;gm-generic gm-pane&quot; data-pane=&quot;about&quot; hidden&gt;
        &lt;div class=&quot;gm-page-head&quot;&gt;&lt;div&gt;&lt;h3&gt;关于&lt;/h3&gt;&lt;p class=&quot;text-small text-muted&quot;&gt;版本信息、项目说明与开源项目致谢。&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;
        &lt;div class=&quot;gm-about-copy&quot;&gt;
          &lt;div class=&quot;gm-about-banner&quot;&gt;
            &lt;span class=&quot;gm-about-icon&quot;&gt;&lt;i data-lucide=&quot;audio-lines&quot; aria-hidden=&quot;true&quot;&gt;&lt;/i&gt;&lt;/span&gt;
            &lt;div&gt;&lt;h3&gt;TMSpeech&lt;/h3&gt;&lt;p&gt;A simple tool for recognize system audio.&lt;/p&gt;&lt;/div&gt;
          &lt;/div&gt;

          &lt;div class=&quot;gm-about-meta&quot;&gt;
            &lt;div&gt;&lt;span class=&quot;text-small text-muted&quot;&gt;版本&lt;/span&gt;&lt;div&gt;&lt;code&gt;1.0.0-demo&lt;/code&gt;&lt;/div&gt;&lt;/div&gt;
            &lt;div&gt;&lt;span class=&quot;text-small text-muted&quot;&gt;内部版本&lt;/span&gt;&lt;div&gt;&lt;code&gt;local-preview&lt;/code&gt;&lt;/div&gt;&lt;/div&gt;
          &lt;/div&gt;

          &lt;div class=&quot;gm-inline&quot;&gt;
            &lt;button class=&quot;btn&quot; type=&quot;button&quot;&gt;&lt;i data-lucide=&quot;refresh-cw&quot; aria-hidden=&quot;true&quot;&gt;&lt;/i&gt;检查更新&lt;/button&gt;
          &lt;/div&gt;

          &lt;div&gt;
            &lt;h3&gt;Open source projects&lt;/h3&gt;
            &lt;p class=&quot;text-small text-muted&quot;&gt;This tool is made possible by the following open source projects:&lt;/p&gt;
            &lt;div class=&quot;gm-about-projects&quot;&gt;
              &lt;div class=&quot;gm-about-project&quot;&gt;
                &lt;h3&gt;sherpa-onnx&lt;/h3&gt;
                &lt;p&gt;Real-time speech recognition&lt;/p&gt;
                &lt;a href=&quot;https://k2-fsa.github.io/sherpa/&quot; target=&quot;_blank&quot; rel=&quot;noreferrer&quot;&gt;https://k2-fsa.github.io/sherpa/&lt;/a&gt;
              &lt;/div&gt;
              &lt;div class=&quot;gm-about-project&quot;&gt;
                &lt;h3&gt;NAudio&lt;/h3&gt;
                &lt;p&gt;An open source .NET audio library written by Mark Heath&lt;/p&gt;
                &lt;a href=&quot;https://github.com/naudio/NAudio&quot; target=&quot;_blank&quot; rel=&quot;noreferrer&quot;&gt;https://github.com/naudio/NAudio&lt;/a&gt;
              &lt;/div&gt;
            &lt;/div&gt;
          &lt;/div&gt;
        &lt;/div&gt;
      &lt;/section&gt;
      &lt;/div&gt;
    &lt;/main&gt;
  &lt;/div&gt;
&lt;/div&gt;

&lt;script&gt;
(() =&gt; {
  const root = document.getElementById(&#x27;tmspeech-glass-settings&#x27;);
  if (!root) return;

  const saveStatus = root.querySelector(&#x27;#gm-save-status&#x27;);
  const caption = root.querySelector(&#x27;#gm-caption&#x27;);
  const font = root.querySelector(&#x27;#gm-font&#x27;);
  const size = root.querySelector(&#x27;#gm-size&#x27;);
  const color = root.querySelector(&#x27;#gm-color&#x27;);
  const opacity = root.querySelector(&#x27;#gm-opacity&#x27;);
  const shadow = root.querySelector(&#x27;#gm-shadow&#x27;);
  const shell = root.querySelector(&#x27;.gm-shell&#x27;);
  const nav = root.querySelector(&#x27;.gm-nav&#x27;);
  const indicator = root.querySelector(&#x27;.gm-nav-indicator&#x27;);
  const pageScroll = root.querySelector(&#x27;#gm-page-scroll&#x27;);
  const displayPane = root.querySelector(&#x27;#gm-display-pane&#x27;);
  const genericPane = root.querySelector(&#x27;#gm-generic-pane&#x27;);
  const aboutPane = root.querySelector(&#x27;#gm-about-pane&#x27;);
  const reducedMotion = window.matchMedia(&#x27;(prefers-reduced-motion: reduce)&#x27;).matches;
  let saveTimer;
  let currentKey = &#x27;display&#x27;;
  let transitionToken = 0;

  const sections = {
    general: {
      title: &#x27;通用&#x27;, description: &#x27;管理启动行为、日志与字幕锁定后的快捷操作。&#x27;,
      rows: [
        [&#x27;启动后开始识别&#x27;, &#x27;打开应用时自动使用上次的音频源。&#x27;, &#x27;switch&#x27;, true],
        [&#x27;识别日志文件夹&#x27;, &#x27;保存字幕记录和诊断日志。&#x27;, &#x27;text&#x27;, &#x27;文档\\TMSpeech\\Logs&#x27;],
        [&#x27;显示悬浮工具栏&#x27;, &#x27;字幕锁定后仍可快速控制识别。&#x27;, &#x27;switch&#x27;, true]
      ]
    },
    notification: {
      title: &#x27;通知&#x27;, description: &#x27;设置状态变化和识别结果的提醒方式。&#x27;,
      rows: [
        [&#x27;通知类型&#x27;, &#x27;选择主要提醒渠道。&#x27;, &#x27;select&#x27;, [&#x27;系统通知&#x27;, &#x27;应用内提示&#x27;, &#x27;关闭通知&#x27;]],
        [&#x27;隐藏敏感内容&#x27;, &#x27;通知中不显示匹配到的敏感词。&#x27;, &#x27;switch&#x27;, true]
      ]
    },
    audio: {
      title: &#x27;音频源&#x27;, description: &#x27;选择需要识别的系统声音或麦克风输入。&#x27;,
      rows: [
        [&#x27;当前音频源&#x27;, &#x27;系统默认输出 · 48 kHz · 立体声&#x27;, &#x27;select&#x27;, [&#x27;系统音频&#x27;, &#x27;默认麦克风&#x27;, &#x27;应用进程音频&#x27;]],
        [&#x27;设备断开后自动切换&#x27;, &#x27;切换到当前可用的默认设备。&#x27;, &#x27;switch&#x27;, true]
      ]
    },
    recognition: {
      title: &#x27;语音识别&#x27;, description: &#x27;配置识别引擎、语言模型与响应策略。&#x27;,
      rows: [
        [&#x27;识别引擎&#x27;, &#x27;当前使用本地离线引擎。&#x27;, &#x27;select&#x27;, [&#x27;Sherpa ONNX&#x27;, &#x27;Streaming ASR&#x27;, &#x27;Aliyun Cloud&#x27;]],
        [&#x27;识别语言&#x27;, &#x27;用于提高模型识别准确率。&#x27;, &#x27;select&#x27;, [&#x27;中文（普通话）&#x27;, &#x27;English&#x27;, &#x27;自动检测&#x27;]],
        [&#x27;自动标点&#x27;, &#x27;为识别结果自动添加标点。&#x27;, &#x27;switch&#x27;, true]
      ]
    },
    resources: {
      title: &#x27;资源管理&#x27;, description: &#x27;管理离线识别模型及其他可选资源。&#x27;,
      rows: [
        [&#x27;中文流式识别模型&#x27;, &#x27;已安装 · 248 MB&#x27;, &#x27;action&#x27;, &#x27;管理&#x27;],
        [&#x27;标点恢复模型&#x27;, &#x27;可选资源 · 86 MB&#x27;, &#x27;action&#x27;, &#x27;安装&#x27;]
      ]
    },
    about: {
      title: &#x27;关于&#x27;, description: &#x27;TMSpeech 是一个简洁的桌面实时语音识别工具。&#x27;,
      rows: [
        [&#x27;版本&#x27;, &#x27;Avalonia UI 桌面应用&#x27;, &#x27;value&#x27;, &#x27;1.0.0-demo&#x27;],
        [&#x27;界面主题&#x27;, &#x27;自动适配系统浅色或深色模式。&#x27;, &#x27;select&#x27;, [&#x27;跟随系统&#x27;, &#x27;浅色&#x27;, &#x27;深色&#x27;]]
      ]
    }
  };

  const markSaved = () =&gt; {
    window.clearTimeout(saveTimer);
    saveStatus.textContent = &#x27;正在保存…&#x27;;
    saveTimer = window.setTimeout(() =&gt; { saveStatus.textContent = &#x27;所有更改已自动保存&#x27;; }, 520);
  };

  const updatePreview = () =&gt; {
    const fontName = font.options[font.selectedIndex].text;
    const fontSize = Number(size.value);
    const alpha = Number(opacity.value) / 100;
    const shadowSize = Number(shadow.value);
    caption.style.fontFamily = font.value;
    caption.style.fontSize = `${fontSize}px`;
    caption.style.color = color.value;
    caption.style.backgroundColor = `rgba(20, 24, 32, ${alpha})`;
    caption.style.textShadow = shadowSize ? `0 1px ${shadowSize * 2}px rgba(0, 0, 0, 0.9)` : &#x27;none&#x27;;
    root.querySelector(&#x27;#gm-size-value&#x27;).textContent = `${fontSize} px`;
    root.querySelector(&#x27;#gm-opacity-value&#x27;).textContent = `${opacity.value}%`;
    root.querySelector(&#x27;#gm-shadow-value&#x27;).textContent = `${shadowSize} px`;
    root.querySelector(&#x27;#gm-color-value&#x27;).textContent = color.value.toUpperCase();
    root.querySelector(&#x27;#gm-preview-font&#x27;).textContent = `${fontName} · ${fontSize} px`;
  };

  const controlMarkup = (type, value, index, label) =&gt; {
    const id = `gm-generated-${index}`;
    if (type === &#x27;switch&#x27;) return `&lt;label class=&quot;form-check form-switch&quot;&gt;&lt;input id=&quot;${id}&quot; class=&quot;form-check-input&quot; type=&quot;checkbox&quot; aria-label=&quot;${label}&quot; ${value ? &#x27;checked&#x27; : &#x27;&#x27;}&gt;&lt;span class=&quot;form-check-label&quot;&gt;${value ? &#x27;已开启&#x27; : &#x27;已关闭&#x27;}&lt;/span&gt;&lt;/label&gt;`;
    if (type === &#x27;text&#x27;) return `&lt;input id=&quot;${id}&quot; class=&quot;form-control&quot; aria-label=&quot;${label}&quot; value=&quot;${value}&quot;&gt;`;
    if (type === &#x27;select&#x27;) return `&lt;select id=&quot;${id}&quot; class=&quot;form-select&quot; aria-label=&quot;${label}&quot;&gt;${value.map(item =&gt; `&lt;option&gt;${item}&lt;/option&gt;`).join(&#x27;&#x27;)}&lt;/select&gt;`;
    if (type === &#x27;action&#x27;) return `&lt;button class=&quot;btn ${value === &#x27;安装&#x27; ? &#x27;btn-primary&#x27; : &#x27;&#x27;}&quot; type=&quot;button&quot; aria-label=&quot;${label}&quot;&gt;${value}&lt;/button&gt;`;
    return `&lt;code&gt;${value}&lt;/code&gt;`;
  };

  const renderGeneric = key =&gt; {
    const data = sections[key];
    root.querySelector(&#x27;#gm-generic-title&#x27;).textContent = data.title;
    root.querySelector(&#x27;#gm-generic-description&#x27;).textContent = data.description;
    root.querySelector(&#x27;#gm-generic-body&#x27;).innerHTML = `&lt;section class=&quot;gm-section&quot;&gt;&lt;div class=&quot;gm-section-head&quot;&gt;&lt;h3&gt;功能设置&lt;/h3&gt;&lt;/div&gt;${data.rows.map((row, index) =&gt; `&lt;div class=&quot;gm-setting&quot;&gt;&lt;div class=&quot;gm-copy&quot;&gt;&lt;span&gt;${row[0]}&lt;/span&gt;&lt;p class=&quot;text-small text-muted&quot;&gt;${row[1]}&lt;/p&gt;&lt;/div&gt;&lt;div class=&quot;gm-control&quot;&gt;${controlMarkup(row[2], row[3], index, row[0])}&lt;/div&gt;&lt;/div&gt;`).join(&#x27;&#x27;)}&lt;/section&gt;`;
    root.querySelectorAll(&#x27;#gm-generic-body input, #gm-generic-body select, #gm-generic-body button&#x27;).forEach(control =&gt; control.addEventListener(&#x27;change&#x27;, markSaved));
  };

  const updateIndicator = button =&gt; {
    if (!button || !indicator || window.getComputedStyle(indicator).display === &#x27;none&#x27;) return;
    const navRect = nav.getBoundingClientRect();
    const buttonRect = button.getBoundingClientRect();
    indicator.style.height = `${buttonRect.height}px`;
    indicator.style.transform = `translateY(${buttonRect.top - navRect.top}px)`;
  };

  const switchSection = (key, button) =&gt; {
    root.querySelectorAll(&#x27;[data-section]&#x27;).forEach(item =&gt; {
      const active = item === button;
      item.setAttribute(&#x27;aria-selected&#x27;, String(active));
      item.classList.toggle(&#x27;is-selected&#x27;, active);
    });
    updateIndicator(button);
    if (key === currentKey) return;

    const token = ++transitionToken;
    const paneForKey = paneKey =&gt; paneKey === &#x27;display&#x27; ? displayPane : paneKey === &#x27;about&#x27; ? aboutPane : genericPane;
    const currentPane = paneForKey(currentKey);
    currentPane.classList.add(&#x27;gm-page-leaving&#x27;);

    window.setTimeout(() =&gt; {
      if (token !== transitionToken) return;
      currentPane.hidden = true;
      currentPane.classList.remove(&#x27;gm-page-leaving&#x27;);

      const nextPane = paneForKey(key);
      if (key !== &#x27;display&#x27; &amp;&amp; key !== &#x27;about&#x27;) renderGeneric(key);
      nextPane.hidden = false;
      nextPane.classList.add(&#x27;gm-page-entering&#x27;);
      pageScroll.scrollTop = 0;
      currentKey = key;

      window.requestAnimationFrame(() =&gt; {
        window.requestAnimationFrame(() =&gt; nextPane.classList.remove(&#x27;gm-page-entering&#x27;));
      });
    }, reducedMotion ? 0 : 140);
  };

  root.querySelectorAll(&#x27;[data-section]&#x27;).forEach(button =&gt; {
    button.addEventListener(&#x27;click&#x27;, () =&gt; switchSection(button.dataset.section, button));
  });

  root.querySelectorAll(&#x27;[data-window-action]&#x27;).forEach(button =&gt; {
    button.addEventListener(&#x27;click&#x27;, () =&gt; {
      const action = button.dataset.windowAction;
      window.clearTimeout(saveTimer);
      if (action === &#x27;maximize&#x27;) {
        const maximized = shell.classList.toggle(&#x27;gm-maximized&#x27;);
        button.setAttribute(&#x27;aria-label&#x27;, maximized ? &#x27;还原窗口&#x27; : &#x27;最大化窗口&#x27;);
        saveStatus.textContent = maximized ? &#x27;窗口已最大化&#x27; : &#x27;窗口已还原&#x27;;
      } else if (action === &#x27;minimize&#x27;) {
        saveStatus.textContent = &#x27;最小化窗口（交互示意）&#x27;;
      } else {
        saveStatus.textContent = &#x27;关闭窗口（交互示意）&#x27;;
      }
      saveTimer = window.setTimeout(() =&gt; { saveStatus.textContent = &#x27;所有更改已自动保存&#x27;; }, 900);
    });
  });

  [font, size, color, opacity, shadow].forEach(control =&gt; {
    control.addEventListener(&#x27;input&#x27;, () =&gt; { updatePreview(); markSaved(); });
    control.addEventListener(&#x27;change&#x27;, () =&gt; { updatePreview(); markSaved(); });
  });

  root.querySelectorAll(&#x27;[data-align]&#x27;).forEach(button =&gt; {
    button.addEventListener(&#x27;click&#x27;, () =&gt; {
      const align = button.dataset.align;
      caption.style.textAlign = align;
      root.querySelectorAll(&#x27;[data-align]&#x27;).forEach(item =&gt; {
        const active = item === button;
        item.setAttribute(&#x27;aria-pressed&#x27;, String(active));
        item.classList.toggle(&#x27;is-selected&#x27;, active);
      });
      root.querySelector(&#x27;#gm-preview-align&#x27;).textContent = align === &#x27;left&#x27; ? &#x27;左对齐&#x27; : align === &#x27;right&#x27; ? &#x27;右对齐&#x27; : &#x27;居中对齐&#x27;;
      markSaved();
    });
  });

  root.querySelector(&#x27;#gm-reset&#x27;).addEventListener(&#x27;click&#x27;, () =&gt; {
    font.selectedIndex = 0;
    size.value = &#x27;32&#x27;;
    color.value = &#x27;#ffffff&#x27;;
    opacity.value = &#x27;78&#x27;;
    shadow.value = &#x27;2&#x27;;
    root.querySelector(&#x27;[data-align=&quot;center&quot;]&#x27;).click();
    updatePreview();
  });

  updatePreview();
  window.requestAnimationFrame(() =&gt; updateIndicator(root.querySelector(&#x27;[data-section][aria-selected=&quot;true&quot;]&#x27;)));
  window.addEventListener(&#x27;resize&#x27;, () =&gt; updateIndicator(root.querySelector(&#x27;[data-section][aria-selected=&quot;true&quot;]&#x27;)));
})();
&lt;/script&gt;

&lt;script src=&quot;https://unpkg.com/@floating-ui/core@1.7.3/dist/floating-ui.core.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script src=&quot;https://unpkg.com/@floating-ui/dom@1.7.4/dist/floating-ui.dom.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script&gt;
(() =&gt; {
  if (window.FloatingUIDOM == null) {
    return;
  }
