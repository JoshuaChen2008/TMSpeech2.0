.form-range::-moz-range-track {
  height: 28px;
  background: transparent;
}

.form-range::-moz-range-thumb {

  height: 20px;

}

.form-range:focus-visible::-moz-range-thumb {
  border-color: var(--ring);
  box-shadow: inset 0 0 0 1px var(--ring);
}

.form-range:disabled {
  cursor: not-allowed;
  opacity: 0.4;
}

.btn:not(.btn-primary, .viz-tile):is(

}

.btn:focus-visible {
  outline: 2px solid var(--ring);
  outline-offset: 2px;
}

svg {
  display: block;
  max-width: 100%;
  height: auto;
}

#widget &gt; svg {
  width: 100%;
}

.text-warning,
.text-destructive {
  color: var(--destructive);
}

&lt;style&gt;
  #tmspeech-settings-demo {

    background: var(--primary);

  #tmspeech-settings-demo .tm-layout {

  #tmspeech-settings-demo .tm-nav {

  #tmspeech-settings-demo .tm-section-head p,

    gap: var(--tm-space-5);
    align-items: start;

  #tmspeech-settings-demo .tm-preview-wrap {
    position: sticky;
    top: var(--tm-space-3);
  }

  #tmspeech-settings-demo .tm-preview-stage {
    min-height: 15rem;
    display: grid;
    place-items: center;
    padding: var(--tm-space-4);
    margin-top: var(--tm-space-3);
    overflow: hidden;
    background:
      radial-gradient(circle at 15% 20%, color-mix(in srgb, var(--viz-series-1) 16%, transparent), transparent 38%),

    gap: var(--tm-space-2);
    margin-top: var(--tm-space-2);

    gap: var(--tm-space-5);

  #tmspeech-settings-demo .tm-section {

    gap: var(--tm-space-2);
  }

  #tmspeech-settings-demo .tm-color-row {

    gap: var(--tm-space-2);
    align-items: center;

  @media (max-width: 760px) {

      border-right: 0;
      border-bottom: 1px solid var(--border);

    #tmspeech-settings-demo .tm-main { padding: var(--tm-space-4) 0; }
    #tmspeech-settings-demo .tm-display-grid { grid-template-columns: 1fr; }
    #tmspeech-settings-demo .tm-preview-wrap { position: static; }
  }

  @media (max-width: 480px) {

    #tmspeech-settings-demo .tm-nav { grid-template-columns: 1fr; }
    #tmspeech-settings-demo .tm-setting-row { grid-template-columns: 1fr; }
    #tmspeech-settings-demo .tm-path-row { grid-template-columns: 1fr; }
    #tmspeech-settings-demo .tm-actions { justify-content: flex-start; }
  }

  @media (prefers-reduced-motion: reduce) {
    #tmspeech-settings-demo .tm-caption { transition: none; }
  }

&lt;script&gt;
(() =&gt; {
  const root = document.getElementById(&#x27;tmspeech-settings-demo&#x27;);
  if (!root) return;

  const caption = root.querySelector(&#x27;#tm-caption&#x27;);
  const fontFamily = root.querySelector(&#x27;#tm-font-family&#x27;);
  const fontSize = root.querySelector(&#x27;#tm-font-size&#x27;);
  const fontColor = root.querySelector(&#x27;#tm-font-color&#x27;);
  const bgColor = root.querySelector(&#x27;#tm-bg-color&#x27;);
  const bgOpacity = root.querySelector(&#x27;#tm-bg-opacity&#x27;);
  const shadowSize = root.querySelector(&#x27;#tm-shadow-size&#x27;);
  const saveStatus = root.querySelector(&#x27;#tm-save-status&#x27;);
  let saveTimer;

  const hexToRgba = (hex, alpha) =&gt; {
    const value = hex.replace(&#x27;#&#x27;, &#x27;&#x27;);
    const number = Number.parseInt(value, 16);
    return `rgba(${(number &gt;&gt; 16) &amp; 255}, ${(number &gt;&gt; 8) &amp; 255}, ${number &amp; 255}, ${alpha})`;
  };

  const markSaved = () =&gt; {
    window.clearTimeout(saveTimer);
    saveStatus.textContent = &#x27;正在保存…&#x27;;
    saveTimer = window.setTimeout(() =&gt; { saveStatus.textContent = &#x27;所有更改已自动保存&#x27;; }, 520);
  };

  const updatePreview = () =&gt; {
    const fontName = fontFamily.options[fontFamily.selectedIndex].text;
    const size = Number(fontSize.value);
    const opacity = Number(bgOpacity.value) / 100;
    const shadow = Number(shadowSize.value);
    caption.style.fontFamily = fontFamily.value;
    caption.style.fontSize = `${size}px`;
    caption.style.color = fontColor.value;
    caption.style.backgroundColor = hexToRgba(bgColor.value, opacity);
    caption.style.textShadow = shadow === 0 ? &#x27;none&#x27; : `0 ${Math.max(1, shadow / 2)}px ${shadow * 2}px rgba(0, 0, 0, 0.9)`;
    root.querySelector(&#x27;#tm-font-size-value&#x27;).textContent = `${size} px`;
    root.querySelector(&#x27;#tm-bg-opacity-value&#x27;).textContent = `${bgOpacity.value}%`;
    root.querySelector(&#x27;#tm-shadow-size-value&#x27;).textContent = `${shadow} px`;
    root.querySelector(&#x27;#tm-font-color-value&#x27;).textContent = fontColor.value.toUpperCase();
    root.querySelector(&#x27;#tm-bg-color-value&#x27;).textContent = bgColor.value.toUpperCase();
    root.querySelector(&#x27;#tm-preview-font&#x27;).textContent = `${fontName} · ${size} px`;
  };

  root.querySelectorAll(&#x27;[data-pane-target]&#x27;).forEach(button =&gt; {
    button.addEventListener(&#x27;click&#x27;, () =&gt; {
      const target = button.dataset.paneTarget;
      root.querySelectorAll(&#x27;[data-pane-target]&#x27;).forEach(item =&gt; {
        const active = item === button;
        item.setAttribute(&#x27;aria-selected&#x27;, String(active));
        item.classList.toggle(&#x27;is-selected&#x27;, active);
      });
      root.querySelectorAll(&#x27;[data-pane]&#x27;).forEach(pane =&gt; { pane.hidden = pane.dataset.pane !== target; });
    });
  });

  [fontFamily, fontSize, fontColor, bgColor, bgOpacity, shadowSize].forEach(control =&gt; {
    control.addEventListener(&#x27;input&#x27;, () =&gt; { updatePreview(); markSaved(); });
    control.addEventListener(&#x27;change&#x27;, () =&gt; { updatePreview(); markSaved(); });
  });

  root.querySelectorAll(&#x27;[data-align]&#x27;).forEach(button =&gt; {
    button.addEventListener(&#x27;click&#x27;, () =&gt; {
      const align = button.dataset.align;
      caption.style.textAlign = align;
      root.querySelectorAll(&#x27;[data-align]&#x27;).forEach(item =&gt; {
        const active = item === button;
        item.setAttribute(&#x27;aria-pressed&#x27;, String(active));
        item.classList.toggle(&#x27;is-selected&#x27;, active);
      });
      root.querySelector(&#x27;#tm-preview-align&#x27;).textContent = align === &#x27;left&#x27; ? &#x27;左对齐&#x27; : align === &#x27;right&#x27; ? &#x27;右对齐&#x27; : &#x27;居中对齐&#x27;;
      markSaved();
    });
  });

  root.querySelector(&#x27;#tm-reset-display&#x27;).addEventListener(&#x27;click&#x27;, () =&gt; {
    fontFamily.selectedIndex = 0;
    fontSize.value = &#x27;32&#x27;;
    fontColor.value = &#x27;#ffffff&#x27;;
    bgColor.value = &#x27;#141820&#x27;;
    bgOpacity.value = &#x27;78&#x27;;
    shadowSize.value = &#x27;2&#x27;;
    root.querySelector(&#x27;[data-align=&quot;center&quot;]&#x27;).click();
    updatePreview();
  });

  root.querySelectorAll(&#x27;input, select, textarea&#x27;).forEach(control =&gt; {
    if (![fontFamily, fontSize, fontColor, bgColor, bgOpacity, shadowSize].includes(control)) {
      control.addEventListener(&#x27;change&#x27;, markSaved);
    }
  });

  root.querySelector(&#x27;#tm-browse&#x27;).addEventListener(&#x27;click&#x27;, () =&gt; {
    root.querySelector(&#x27;#tm-log-path&#x27;).value = &#x27;D:\\TMSpeech\\Logs&#x27;;
    markSaved();
  });

  root.querySelectorAll(&#x27;[data-refresh]&#x27;).forEach(button =&gt; {
    button.addEventListener(&#x27;click&#x27;, () =&gt; {
      const original = button.innerHTML;
      button.disabled = true;
      button.textContent = &#x27;正在刷新…&#x27;;
      window.setTimeout(() =&gt; {
        button.disabled = false;
        button.innerHTML = original;
        if (window.lucide) window.lucide.createIcons({ attrs: { width: 16, height: 16 } });
        markSaved();
      }, 700);
    });
  });

  updatePreview();
})();
&lt;/script&gt;

&lt;script src=&quot;https://unpkg.com/@floating-ui/core@1.7.3/dist/floating-ui.core.umd.min.js&quot;&gt;&lt;/script&gt;

&lt;script&gt;
(() =&gt; {
  if (window.FloatingUIDOM == null) {
    return;
  }
  const { autoUpdate, computePosition, flip, offset, shift, size } =
    window.FloatingUIDOM;
  const tooltipPlacements = new Set([&quot;top&quot;, &quot;right&quot;, &quot;bottom&quot;, &quot;left&quot;]);
  const tooltipId = `codex-visualization-tooltip-${
    window.crypto?.randomUUID?.() ?? Date.now().toString(36)
  }`;
  const tooltipGap = 5;
  const hoverDelay = 700;
  const skipDelay = 300;
  let activeTrigger = null;
  let pendingTrigger = null;
  let tooltip = null;
  let openTimeout = null;
  let autoUpdateCleanup = null;
  let positionRequest = 0;
  let skipDelayUntil = 0;

  const getTrigger = (target) =&gt;
    target?.nodeType === Node.ELEMENT_NODE
      ? target.closest(&quot;[data-tooltip]&quot;)
      : null;
  const containsTarget = (trigger, target) =&gt;
    target?.nodeType != null &amp;&amp; trigger.contains(target);
  const getContent = (trigger) =&gt;
    trigger.getAttribute(&quot;data-tooltip&quot;)?.trim() ?? &quot;&quot;;
  const getPlacement = (trigger) =&gt; {
    const placement = trigger.getAttribute(&quot;data-tooltip-placement&quot;);
    return tooltipPlacements.has(placement) ? placement : &quot;top&quot;;
  };
  const getTooltip = () =&gt; {
    if (tooltip == null) {
      tooltip = document.createElement(&quot;div&quot;);
      tooltip.id = tooltipId;
      tooltip.className = &quot;tooltip&quot;;
      tooltip.setAttribute(&quot;role&quot;, &quot;tooltip&quot;);

    return tooltip;
  };

    const ids = new Set(
      (trigger.getAttribute(&quot;aria-describedby&quot;) ?? &quot;&quot;)
        .split(/\s+/)
        .filter(Boolean),

      ids.add(tooltipId);
    } else {
      ids.delete(tooltipId);
    }

    } else {
      trigger.setAttribute(&quot;aria-describedby&quot;, [...ids].join(&quot; &quot;));
    }

    if (openTimeout != null) {
      window.clearTimeout(openTimeout);
      openTimeout = null;
    }
    pendingTrigger = null;
  };
  const closeTooltip = (activateSkipDelay = true) =&gt; {
    clearOpenTimeout();
    positionRequest += 1;
    autoUpdateCleanup?.();
    autoUpdateCleanup = null;
    if (activeTrigger == null) {
      return;
    }
    setDescribedBy(activeTrigger, false);
    activeTrigger = null;
    tooltip?.remove();
    if (activateSkipDelay) {
      skipDelayUntil = Date.now() + skipDelay;
    }
  };
  const updatePosition = (trigger, floating) =&gt; {
    const request = ++positionRequest;
    void computePosition(trigger, floating, {
      middleware: [
        offset(tooltipGap),
        flip({ padding: tooltipGap }),
        shift({ padding: tooltipGap }),
        size({
          padding: tooltipGap,
          apply({ availableHeight, availableWidth, elements }) {
            elements.floating.style.setProperty(
              &quot;--tooltip-available-width&quot;,
              `${Math.max(0, availableWidth)}px`,
            );
            elements.floating.style.setProperty(
              &quot;--tooltip-available-height&quot;,
              `${Math.max(0, availableHeight)}px`,
            );

        }),
      ],
      placement: getPlacement(trigger),
      strategy: &quot;fixed&quot;,
    })
      .then(({ x, y }) =&gt; {
        if (activeTrigger !== trigger || request !== positionRequest) {
          return;
        }
        const scale = window.devicePixelRatio || 1;
        floating.style.transform = `translate(${Math.round(x * scale) / scale}px, ${Math.round(y * scale) / scale}px)`;
        floating.style.visibility = &quot;visible&quot;;
      })
      .catch(() =&gt; {
        if (activeTrigger === trigger &amp;&amp; request === positionRequest) {
          closeTooltip(false);
        }
      });
  };
  const openTooltip = (trigger) =&gt; {
    const content = getContent(trigger);
    if (!trigger.isConnected || content.length === 0) {
      return;
    }
    clearOpenTimeout();
    if (activeTrigger === trigger) {
      return;
    }
    closeTooltip();
    const floating = getTooltip();
    floating.textContent = content;
    floating.style.visibility = &quot;hidden&quot;;
    floating.style.transform = &quot;translate(0, 0)&quot;;
    document.body.appendChild(floating);

    });

      getContent(trigger).length === 0 ||

      immediate || activeTrigger != null || Date.now() &lt; skipDelayUntil
        ? 0

      openTooltip(trigger);
      return;
    }
    openTimeout = window.setTimeout(() =&gt; {
      openTimeout = null;
      pendingTrigger = null;
      openTooltip(trigger);
    }, delay);

    }

    }

  const handleFocusIn = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (trigger?.matches(&quot;:focus-visible&quot;)) {

  const handleKeyDown = (event) =&gt; {
    if (event.key === &quot;Escape&quot;) {
      closeTooltip();
    }
  };
  const handleContextMenu = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (activeTrigger === trigger || pendingTrigger === trigger) {

    }
  };
  const destroy = () =&gt; {
    closeTooltip(false);
    document.removeEventListener(&quot;pointerover&quot;, handlePointerOpen);
    document.removeEventListener(&quot;pointerout&quot;, handleLeave);
    document.removeEventListener(&quot;focusin&quot;, handleFocusIn);
    document.removeEventListener(&quot;focusout&quot;, handleLeave);
    document.removeEventListener(&quot;keydown&quot;, handleKeyDown);
    document.removeEventListener(&quot;contextmenu&quot;, handleContextMenu);
    tooltip = null;
  };

  document.addEventListener(&quot;pointerover&quot;, handlePointerOpen);
  document.addEventListener(&quot;pointerout&quot;, handleLeave);
  document.addEventListener(&quot;focusin&quot;, handleFocusIn);
  document.addEventListener(&quot;focusout&quot;, handleLeave);
  document.addEventListener(&quot;keydown&quot;, handleKeyDown);
  document.addEventListener(&quot;contextmenu&quot;, handleContextMenu);
  window.addEventListener(&quot;pagehide&quot;, destroy, { once: true });
})();
